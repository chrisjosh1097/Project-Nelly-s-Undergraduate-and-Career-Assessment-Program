[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_APP_ID,FIREBASE_PROJECT_ID"

[[redirects]]
  from = "/__/auth/*"
  to = "https://project-nelly-future.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true
